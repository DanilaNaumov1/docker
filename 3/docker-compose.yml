x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    PYTHONPATH: /opt/airflow
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-your_access_key}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-your_secret_key}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-file:/opt/airflow/mlruns}
    MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-training_experiment}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}:/opt/airflow
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      timeout: 5s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "$${AIRFLOW_UID}" ]]; then
          echo "WARNING: AIRFLOW_UID not set! Using default."
        fi
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "$${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins}
        if [[ "$${_AIRFLOW_DB_UPGRADE}" == "true" ]]; then
          echo "Initializing database..."
          /entrypoint airflow db upgrade || /entrypoint airflow db init || true
        fi
        if [[ "$${_AIRFLOW_WWW_USER_CREATE}" == "true" ]]; then
          echo "Creating admin user..."
          /entrypoint airflow users create \
            --username "$${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
            --firstname "$${_AIRFLOW_WWW_USER_FIRSTNAME:-Airflow}" \
            --lastname "$${_AIRFLOW_WWW_USER_LASTNAME:-User}" \
            --role "$${_AIRFLOW_WWW_USER_ROLE:-Admin}" \
            --email "$${_AIRFLOW_WWW_USER_EMAIL:-airflow@example.com}" \
            --password "$${_AIRFLOW_WWW_USER_PASSWORD:-airflow}" || echo "User may already exist, skipping..."
        fi
        echo "Initialization complete!"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
    command:
      - bash
      - -c
      - airflow

volumes:
  postgres-db-volume: